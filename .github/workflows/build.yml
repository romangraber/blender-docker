name: Build and Push Blender Image

# Trigger manually from the Actions tab. Pick which Blender version you want.
on:
  workflow_dispatch:
    inputs:
      blender_version:
        description: 'Full Blender version (e.g. 4.4.3 or 5.0.1)'
        required: true
        default: '4.4.3'
      image_name:
        description: 'Image name on Docker Hub (without username)'
        required: true
        default: 'blender-runpod'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Derive Blender major version
        id: version
        run: |
          FULL="${{ inputs.blender_version }}"
          MAJOR=$(echo "$FULL" | cut -d. -f1,2)
          echo "Full: $FULL  ->  Major: $MAJOR"
          echo "major=$MAJOR" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free up disk space
        # GitHub runners only have ~14GB free by default, and building a CUDA + Blender
        # image plus pulling the base layers can run tight. This frees ~25GB.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            BLENDER_VERSION=${{ inputs.blender_version }}
            BLENDER_MAJOR=${{ inputs.blender_major }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ inputs.blender_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ inputs.blender_major }}

      - name: Done
        run: |
          echo "Pushed:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ inputs.blender_version }}"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ inputs.blender_major }}"
